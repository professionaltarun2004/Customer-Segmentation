project:
  name: Customer Intelligence Platform
  version: 1.0

data:
  raw_data_path: data/raw/online_retail.csv
  processed_data_path: data/processed/customer_features.csv

feature_engineering:
  recency_days: 365
  weekend_weight: true

model:
  algorithm: kmeans
  random_state: 42
  max_iter: 300
  init: k-means++
  n_clusters: 5

mlflow:
  experiment_name: Customer Segmentation

artifacts:
  model_dir: artifacts/model
  profiling_dir: artifacts/profiling
  reports_dir: artifacts/reports

dashboard:
  title: Customer Intelligence Dashboard

api:
  host: 0.0.0.0
  port: 8000